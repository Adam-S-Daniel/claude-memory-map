name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chrome for Testing
        run: npm run setup:browser

      - name: Build index.html
        run: npm run build

      # The committed index.html must BE the build output. The site-sync /
      # site-preview workflows copy the committed file to adamdaniel.ai, so
      # this check is what makes that copy the verified build artifact.
      - name: Verify committed index.html matches the build
        run: |
          if ! git diff --exit-code -- index.html; then
            echo "::error::index.html is stale — run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Run e2e test suite
        run: npm test
